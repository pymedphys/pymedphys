name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

# Default to read-only. Jobs that need more override at the job level.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      mosaiq: ${{ steps.filter.outputs.mosaiq }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36
        id: filter
        with:
          filters: |
            mosaiq:
              - 'lib/pymedphys/**/*mosaiq*'
              - 'lib/pymedphys/**/*database*'
            docs:
              - 'docs/**'
              - 'lib/pymedphys/docs/**'
              - '*.md'

  # Pre-commit always runs. Needs write access for auto-fix pushes on PRs.
  pre-commit:
    uses: ./.github/workflows/pre-commit.yml
    permissions:
      contents: write
    secrets:
      PYMEDPHYS_CI_BOT_APP_ID: ${{ secrets.PYMEDPHYS_CI_BOT_APP_ID }}
      PYMEDPHYS_CI_BOT_TOKEN: ${{ secrets.PYMEDPHYS_CI_BOT_TOKEN }}

  # Linting — skip if pre-commit pushed an auto-fix (a fresh run is coming).
  lint:
    needs: [pre-commit]
    if: |
      (success() || failure()) &&
      needs.pre-commit.outputs.autofix-pushed != 'true'
    uses: ./.github/workflows/lint.yml

  # Type checking — skip if auto-fix pushed.
  type-check:
    needs: [pre-commit]
    if: |
      (success() || failure()) &&
      needs.pre-commit.outputs.autofix-pushed != 'true'
    uses: ./.github/workflows/type-check.yml

  # Unit tests — skip if auto-fix pushed.
  unit-tests:
    needs: [pre-commit]
    if: |
      (success() || failure()) &&
      needs.pre-commit.outputs.autofix-pushed != 'true'
    uses: ./.github/workflows/unit-tests.yml
    with:
      quick: ${{ github.event_name == 'pull_request' }}

  # Integration tests on main or when labeled — skip if auto-fix pushed.
  integration-tests:
    needs: [pre-commit, unit-tests]
    if: |
      needs.pre-commit.outputs.autofix-pushed != 'true' && (
        github.event_name == 'push' ||
        contains(github.event.pull_request.labels.*.name, 'full-test')
      )
    uses: ./.github/workflows/integration-tests.yml
    with:
      run-slow: ${{ github.event_name == 'push' }}

  # Database tests based on changes or labels — skip if auto-fix pushed.
  mosaiq-db-tests:
    needs: [pre-commit, changes]
    if: |
      (success() || failure()) &&
      needs.pre-commit.outputs.autofix-pushed != 'true' && (
        github.event_name == 'push' ||
        contains(github.event.pull_request.labels.*.name, 'database') ||
        needs.changes.outputs.mosaiq == 'true'
      )
    uses: ./.github/workflows/mosaiq-db-tests.yml

  # Docs check for PRs with doc changes — skip if auto-fix pushed.
  docs-check:
    needs: [pre-commit, changes]
    if: |
      needs.pre-commit.outputs.autofix-pushed != 'true' &&
      github.event_name == 'pull_request' &&
      needs.changes.outputs.docs == 'true'
    uses: ./.github/workflows/docs.yml
    with:
      publish: false
    permissions:
      contents: read
      pages: write
      id-token: write

  # Docs publish on main — gated on the full core CI set.
  docs-publish:
    needs: [lint, type-check, unit-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/docs.yml
    with:
      publish: true
    permissions:
      contents: write
      pages: write
      id-token: write

  # Summary job provides overall status.
  summary:
    needs: [pre-commit, lint, type-check, unit-tests, integration-tests, mosaiq-db-tests, docs-check, docs-publish]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Generate Summary
        run: |
          if [[ "${{ needs.pre-commit.outputs.autofix-pushed }}" == "true" ]]; then
            cat >> "$GITHUB_STEP_SUMMARY" << 'EOF'
          ## CI Results

          Pre-commit pushed an auto-fix commit. A fresh CI run will validate the fixes.
          All other checks were skipped for this run.
          EOF
            exit 0
          fi

          cat >> "$GITHUB_STEP_SUMMARY" << 'EOF'
          ## CI Results

          ### Core Checks (Always Run)
          | Check | Status |
          |-------|--------|
          | Pre-commit | ${{ needs.pre-commit.result }} |
          | Lint | ${{ needs.lint.result }} |
          | Type Check | ${{ needs.type-check.result }} |
          | Unit Tests | ${{ needs.unit-tests.result }} |

          ### Extended Checks
          | Check | Status |
          |-------|--------|
          | Integration Tests | ${{ needs.integration-tests.result || 'skipped' }} |
          | Database Tests | ${{ needs.mosaiq-db-tests.result || 'skipped' }} |
          | Documentation | ${{ needs.docs-check.result || needs.docs-publish.result || 'skipped' }} |

          **Workflow:** ${{ github.workflow }}
          **Triggered by:** ${{ github.actor }}
          **Event:** ${{ github.event_name }}
          **Branch:** ${{ github.ref_name }}
          EOF

      - name: Check Required Status
        if: always() && needs.pre-commit.outputs.autofix-pushed != 'true'
        run: |
          # These must pass for PRs
          if [[ "${{ needs.pre-commit.result }}" != "success" && "${{ needs.pre-commit.result }}" != "skipped" ]]; then
            echo "::error::Pre-commit failed"
            exit 1
          fi
          if [[ "${{ needs.lint.result }}" != "success" && "${{ needs.lint.result }}" != "skipped" ]]; then
            echo "::error::Linting failed"
            exit 1
          fi
          if [[ "${{ needs.type-check.result }}" != "success" && "${{ needs.type-check.result }}" != "skipped" ]]; then
            echo "::error::Type checking failed"
            exit 1
          fi
          if [[ "${{ needs.unit-tests.result }}" != "success" && "${{ needs.unit-tests.result }}" != "skipped" ]]; then
            echo "::error::Unit tests failed"
            exit 1
          fi
          echo "All required checks passed"
