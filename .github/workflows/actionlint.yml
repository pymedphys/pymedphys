name: Actionlint

on:
  pull_request:
    paths:
      - '.github/workflows/*.yml'
      - '.github/actions/**/action.yml'
  push:
    branches: [main]
    paths:
      - '.github/workflows/*.yml'
      - '.github/actions/**/action.yml'

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - name: Run actionlint
        uses: rhysd/actionlint@393031adb9afb225ee52ae2ccd7a5af5525e03e8 # 1.7.11
