name: Pre-commit

on:
  workflow_call:
    secrets:
      PYMEDPHYS_CI_BOT_TOKEN:
        description: Token for pymedphys-ci-bot. Pushes with this token retrigger CI.
        required: false
  workflow_dispatch:

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref }}
          fetch-depth: 0

      - uses: ./.github/actions/setup-project
        with:
          extras: 'all'

      - name: Cache pre-commit
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # 5.0.4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit
        id: pre-commit
        continue-on-error: true
        run: |
          uv run pre-commit run --all-files --show-diff-on-failure

      - name: Push auto-fixes
        # Only auto-fix same-repo pull requests — never push directly to main or to forks.
        if: |
          steps.pre-commit.outcome == 'failure' &&
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        id: autofix
        env:
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          CI_BOT_TOKEN: ${{ secrets.PYMEDPHYS_CI_BOT_TOKEN }}
        run: |
          # Re-run pre-commit to apply auto-fixes (formatters, trailing whitespace, etc.)
          uv run pre-commit run --all-files || true

          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.email "bot@pymedphys.com"
            git config user.name "PyMedPhys Bot"
            git add -A
            git commit -m "style: auto-fix pre-commit issues"

            if [[ -n "$CI_BOT_TOKEN" ]]; then
              # Strip any newlines from the token before embedding in the URL
              CLEAN_TOKEN="$(printf '%s' "${CI_BOT_TOKEN}" | tr -d '\n\r')"
              git remote set-url origin "https://x-access-token:${CLEAN_TOKEN}@github.com/${{ github.repository }}.git"
            fi

            git push origin "HEAD:${PR_BRANCH}"
            echo "pushed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Auto-fix commit pushed. A new CI run will validate the fixes."
          else
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Pre-commit failed but no auto-fixable changes detected."
          fi

      - name: Fail if pre-commit found issues
        if: steps.pre-commit.outcome == 'failure'
        run: |
          if [[ "${{ steps.autofix.outputs.pushed }}" == "true" ]]; then
            echo "::error::Pre-commit failed. Auto-fix commit has been pushed to this branch."
            echo "A new CI run should start automatically."
          else
            echo "::error::Pre-commit failed. Some issues require manual fixes."
          fi
          exit 1
