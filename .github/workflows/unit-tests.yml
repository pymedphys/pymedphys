name: Unit Tests

on:
  workflow_call:
    inputs:
      python-matrix:
        required: false
        type: string
        default: '["3.10", "3.12"]'
      extra-pytest-args:
        required: false
        type: string
        default: ""
      quick:
        required: false
        type: boolean
        default: false
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: ${{ matrix.os }} - py${{ matrix.python-version }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: ${{ inputs.quick && fromJSON('["ubuntu-latest"]') || fromJSON('["ubuntu-latest", "windows-latest", "macos-latest"]') }}
        python-version: ${{ inputs.quick && fromJSON('["3.12"]') || fromJSON(inputs.python-matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - uses: ./.github/actions/setup-project
        with:
          python-version: ${{ matrix.python-version }}
          extras: "dev tests mosaiq"

      - name: Run unit tests
        shell: bash
        env:
          PYTEST_EXTRA: ${{ inputs.extra-pytest-args }}
        run: |
          set -euxo pipefail

          mkdir -p test-results

          uv run pytest -m "not slow" ${PYTEST_EXTRA} \
            --junitxml=test-results/junit-${{ matrix.os }}-${{ matrix.python-version }}.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: junit-${{ matrix.os }}-${{ matrix.python-version }}
          path: test-results/*.xml
          if-no-files-found: ignore
