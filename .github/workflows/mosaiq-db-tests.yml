name: Database Tests

on:
  workflow_call:
  workflow_dispatch:

jobs:
  test-mosaiq-db:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          SA_PASSWORD: sqlServerPassw0rd
        ports:
          - 1433:1433

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - uses: ./.github/actions/setup-project
        with:
          extras: 'mosaiq tests dicom'

      - name: Wait for SQL Server startup
        run: |
          for _i in $(seq 1 30); do
            if /opt/mssql-tools/bin/sqlcmd -S localhost -U SA -P 'sqlServerPassw0rd' -Q 'SELECT 1' &>/dev/null; then
              echo "SQL Server is ready"
              exit 0
            fi
            sleep 2
          done
          echo "SQL Server failed to start"
          exit 1

      - name: Run database tests with retry
        env:
          MOSAIQ_SQL_SERVER: localhost
          MOSAIQ_SQL_USER: SA
          MOSAIQ_SQL_PASSWORD: sqlServerPassw0rd
        run: |
          # Try running tests with retries in case SQL Server needs more time
          for i in {1..3}; do
            echo "Test attempt $i/3"
            if uv run pymedphys dev tests -v --mosaiqdb; then
              echo "Tests passed!"
              exit 0
            fi
            echo "Tests failed, waiting 10 seconds before retry..."
            sleep 10
          done
          echo "Tests failed after 3 attempts"
          exit 1
