name: Setup PyMedPhys Project
description: Standard setup for PyMedPhys CI

inputs:
  python-version:
    description: Python version to use
    default: '3.12'
  extras:
    description: Space-separated list of extras to install
    default: ''
  node-version:
    description: Node.js version (optional)
    default: ''

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # 6.2.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Set up uv
      uses: astral-sh/setup-uv@b75a909f75acd358c2196fb9a5f1299a9a8868a4
      with:
        enable-cache: true
        cache-dependency-glob: |
          uv.lock
          pyproject.toml

    - name: Install dependencies
      shell: bash
      run: |
        set -euxo pipefail
        EXTRAS="${{ inputs.extras }}"
        if [ -n "$EXTRAS" ]; then
          uv sync --frozen $(echo $EXTRAS | xargs -n1 echo --extra)
        else
          uv sync --frozen
        fi

    - name: Cache PyMedPhys data
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # 5.0.4
      with:
        path: ~/.pymedphys
        key: pymedphys-data-${{ hashFiles('**/hashes.json') }}

    - name: Set up Node.js
      if: ${{ inputs.node-version != '' }}
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm
        cache-dependency-path: package-lock.json
